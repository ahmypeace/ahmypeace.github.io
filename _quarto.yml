project:
  type: website
  output-dir: docs

website:
  title: "Amaka Peace Onebunne"
  site-url: "https://ahmypeace.github.io"
  description: "Amaka Peace Onebunne is a researcher studying artificial intelligence, communication, trust, governance, and digital society."

  favicon: assets/images/favicon.png

  navbar:
    pinned: true

    left:
      - text: "APO"
        href: index.qmd
        aria-label: "Amaka Peace Onebunne Home"

    right:
      - text: "Home"
        href: index.qmd

      - text: "About"
        href: about.qmd

      - text: "Research"
        href: research.qmd

      - text: "Publications"
        href: publications.qmd

      - text: "Writing"
        href: writing.qmd

      - text: "News"
        href: news.qmd

      - text: "More"
        menu:
          - text: "Open Research"
            href: open-science.qmd

          - text: "Methods"
            href: methods.qmd

          - text: "Talks and Presentations"
            href: talks.qmd

          - text: "Media"
            href: media.qmd

          - text: "Service and Leadership"
            href: leadership.qmd

          - text: "Contact"
            href: contact.qmd

          - text: "Download CV"
            href: assets/documents/amaka-onebunne-cv.pdf
            target: _blank

  page-footer:
    border: false

    left: |
      © 2026 Amaka Peace Onebunne  
      Temple University · Philadelphia, PA

    center:
      - text: "Google Scholar"
        href: "https://scholar.google.com/citations?user=UtUtPZwAAAAJ&hl=en"

      - text: "ORCID"
        href: "https://orcid.org/0009-0000-3029-5987"

    right:
      - icon: github
        href: "https://github.com/ahmypeace"
        aria-label: "GitHub"

      - icon: linkedin
        href: "https://www.linkedin.com/in/amakapeace/"
        aria-label: "LinkedIn"

      - icon: twitter-x
        href: "https://x.com/Ahmypeace"
        aria-label: "X"

      - icon: youtube
        href: "https://www.youtube.com/@ahmypeace"
        aria-label: "YouTube"

      - icon: facebook
        href: "https://www.facebook.com/amaka.peace.50"
        aria-label: "Facebook"

      - icon: envelope
        href: "mailto:amaka.onebunne@temple.edu"
        aria-label: "Email"

  search: true
  page-navigation: true
  back-to-top-navigation: true
  open-graph: true

  repo-url: "https://github.com/ahmypeace/ahmypeace.github.io"
  repo-actions:
    - source

format:
  html:
    theme: cosmo
    css: styles.css

    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">

    include-after-body:
      - assets/includes/reveal.html

    toc: false
    page-layout: full
    smooth-scroll: true
    link-external-newwindow: true
    lang: en

execute:
  freeze: auto
